# Render Blueprint for Rendy.
#
# This Blueprint provisions:
# - rendy-postgres: managed Postgres for Flowise
# - rendy-orchestration: private orchestration layer, currently powered by
#   Flowise, with room for Python, SDK-driven integrations, custom tooling,
#   and broader orchestration-layer development over time
# - rendy-web: the Vite/Express UI from this repository
#
# Flowise chatflow note:
# - The UI now talks to Flowise through its own /api/flowise proxy.
# - After the first deploy, create or import a chatflow in Flowise and then set
#   VITE_FLOWISE_CHATFLOW_ID on rendy-web to that chatflow UUID.

databases:
  - name: rendy-postgres
    databaseName: rendy
    user: rendy_user
    plan: basic-256mb
    region: oregon

services:
  - type: web
    # Private orchestration layer for the app.
    # This starter uses Flowise today, but this layer is also where Python,
    # SDK integrations, and more custom orchestration/backend logic can grow.
    name: rendy-orchestration
    runtime: docker
    plan: pro
    region: oregon
    repo: https://github.com/northstargpt/Flowise
    healthCheckPath: /api/v1/ping
    disk:
      name: rendy-orchestration-data
      mountPath: /opt/render/.flowise
      sizeGB: 10
    envVars:
      - key: DATABASE_TYPE
        value: postgres
      - key: DATABASE_HOST
        fromDatabase:
          name: rendy-postgres
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: rendy-postgres
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: rendy-postgres
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: rendy-postgres
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: rendy-postgres
          property: password
      - key: DATABASE_SSL
        value: "false"
      - key: EXPRESS_SESSION_SECRET
        generateValue: true
      - key: JWT_AUTH_TOKEN_SECRET
        generateValue: true
      - key: JWT_REFRESH_TOKEN_SECRET
        generateValue: true
      - key: TOKEN_HASH_SECRET
        generateValue: true
      - key: FLOWISE_SECRETKEY_OVERWRITE
        generateValue: true
      - key: SECRETKEY_PATH
        value: /opt/render/.flowise
      - key: LOG_PATH
        value: /opt/render/.flowise/logs
      - key: BLOB_STORAGE_PATH
        value: /opt/render/.flowise/storage
      - key: LOG_LEVEL
        value: debug

  - type: web
    name: rendy-web
    runtime: node
    plan: starter
    region: oregon
    repo: https://github.com/denchanca/rendy
    rootDir: UI/rendy_rt
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: FLOWISE_INTERNAL_HOSTPORT
        fromService:
          type: web
          name: rendy-orchestration
          property: hostport
      - key: VITE_FLOWISE_PROXY_BASE
        value: /api/flowise
      - key: VITE_FLOWISE_CHATFLOW_ID
        value: ""
      - key: VITE_FLOWISE_STREAMING
        value: "true"

  # Future option: scheduled ETL via Render cron job.
  # This is closer to ready than a worker because the current ETL scripts are
  # batch jobs that run once and exit.
  #
  # Before uncommenting:
  # - configure the script's CONFIG block (or refactor it to read env vars cleanly)
  # - set a real cron schedule
  # - remember that Render cron jobs cannot attach persistent disks, so local
  #   ledger files will not persist between runs
  #
  # JSON / JSONL ETL example:
  # - type: cron
  #   name: rendy-json-etl
  #   runtime: python
  #   plan: starter
  #   region: oregon
  #   repo: https://github.com/denchanca/rendy
  #   rootDir: ETL/json-ETL
  #   buildCommand: pip install openai pinecone pandas tqdm
  #   startCommand: python json_to_pinecone.py
  #   schedule: "0 3 * * *"
  #   envVars:
  #     - key: OPENAI_API_KEY
  #       sync: false
  #     - key: PINECONE_API_KEY
  #       sync: false
  #
  # Sitemap ETL variant:
  # - use `rootDir: ETL/sitemap-ETL`
  # - use `buildCommand: pip install playwright openai pinecone tqdm && playwright install chromium`
  # - use `startCommand: python sitemap.py`
